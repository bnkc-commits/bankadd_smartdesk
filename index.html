<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Apporteur Terrain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Apporteur Terrain</h1>

  <input id="username" placeholder="Nom utilisateur">

  <button onclick="loginApporteur()">
    Connexion Offline
  </button>

  <hr>

  <input id="clientName" placeholder="Nom client">

  <textarea id="messageInput"
  placeholder="Description du besoin client"></textarea>

  <button id="sendBtn">
    Envoyer Prospect
  </button>

  <hr>

  <input type="file" id="xmlLoader">

  <button id="loadXmlBtn">
    Charger Produits XML
  </button>

  <hr>

  <button id="exportBtn">
    Exporter .PPF
  </button>

  <input type="file" id="importPPFInput">

  <button id="importBtn">
    Importer .PPF
  </button>

  <hr>

  <div id="messages"></div>

</div>

<script src="../shared/indexeddb.js"></script>
<script src="../shared/crypto.js"></script>
<script src="../shared/ppf-manager.js"></script>
<script src="../shared/xml-loader.js"></script>
<script src="auth.js"></script>
<script src="rtc.js"></script>
<script src="app.js"></script>

</body>
</html>
